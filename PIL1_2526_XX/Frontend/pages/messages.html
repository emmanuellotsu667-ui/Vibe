<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Messages — IFRI MentorLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    .chat-layout { display:flex;height:calc(100vh - 4rem);gap:0; }
    .conv-list { width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;border-radius:var(--radius) 0 0 var(--radius);overflow:hidden; }
    .conv-item { padding:.85rem 1rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s; }
    .conv-item:hover,.conv-item.active { background:rgba(108,99,255,.1); }
    .chat-area { flex:1;display:flex;flex-direction:column;background:var(--surface);border-radius:0 var(--radius) var(--radius) 0; }
    .chat-header { padding:1rem 1.5rem;border-bottom:1px solid var(--border);font-weight:700;display:flex;align-items:center;gap:.7rem; }
    .messages-container { flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:.75rem; }
    .msg { max-width:65%;padding:.65rem 1rem;border-radius:16px;font-size:.9rem;line-height:1.5; }
    .msg.sent { align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:4px; }
    .msg.received { align-self:flex-start;background:var(--bg2);border-bottom-left-radius:4px; }
    .msg-meta { font-size:.72rem;margin-top:.25rem;opacity:.7; }
    .msg-input-bar { padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.7rem; }
    .msg-input { flex:1;padding:.65rem 1rem;background:var(--bg2);border:1.5px solid var(--border);border-radius:24px;color:var(--text);font-size:.9rem; }
    .msg-input:focus { outline:none;border-color:var(--primary); }
    .no-conv { display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text-muted);text-align:center; }
  </style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo">🎓 MentorLink</div>
  <a href="dashboard.html"   class="nav-item"><span class="icon">⊞</span> Dashboard</a>
  <a href="requests.html"    class="nav-item"><span class="icon">📋</span> Offres & Demandes</a>
  <a href="matching.html"    class="nav-item"><span class="icon">⚡</span> Matching</a>
  <a href="messages.html"    class="nav-item active"><span class="icon">💬</span> Messages</a>
  <a href="notifications.html" class="nav-item"><span class="icon">🔔</span> Notifications</a>
  <a href="settings.html"    class="nav-item" style="margin-top:auto;"><span class="icon">⚙</span> Paramètres</a>
  <a href="#" class="nav-item" onclick="API.logout()"><span class="icon">⏏</span> Déconnexion</a>
</nav>
<main class="main-content" style="padding:1rem;">
  <div class="chat-layout">
    <!-- Conversations list -->
    <div class="conv-list">
      <div style="padding:.8rem 1rem;border-bottom:1px solid var(--border);font-weight:700;font-size:.9rem;">💬 Conversations</div>
      <div id="conv-list" style="flex:1;overflow-y:auto;"></div>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chat-area">
      <div class="no-conv">
        <div style="font-size:3rem;margin-bottom:1rem;">💬</div>
        <p>Sélectionne une conversation</p>
        <p style="font-size:.85rem;margin-top:.5rem;">ou contacte un mentor depuis le matching</p>
      </div>
    </div>
  </div>
</main>

<script src="../js/api.js"></script>
<script>
if (!API.isLoggedIn()) window.location.href = 'signin.html';

const user = API.getUser();
let activeConvId = null;
let socket = null;

// Socket.IO
try {
  socket = io('http://localhost:5000', { auth: { token: API.getToken() } });
  socket.on('new_message', (msg) => {
    if (msg.conversation_id === activeConvId) appendMessage(msg);
  });
} catch(e) {}

async function loadConversations() {
  try {
    const data = await API.messages.conversations();
    const el = document.getElementById('conv-list');
    if (!data.conversations.length) {
      el.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem;padding:1rem;">Aucune conversation.</p>';
      return;
    }
    el.innerHTML = data.conversations.map(c => {
      const other = c.participants.find(p => p.id !== user?.id);
      const last = c.last_message;
      return `<div class="conv-item ${c.id===activeConvId?'active':''}" onclick="openConv(${c.id},'${other?.prenom} ${other?.nom}')">
        <div style="font-weight:600;font-size:.9rem;">${other?.prenom||''} ${other?.nom||''}</div>
        <div style="font-size:.78rem;color:var(--text-muted);margin-top:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${last?.content||'Nouvelle conversation'}</div>
      </div>`;
    }).join('');
  } catch(e) {}
}

async function openConv(convId, name) {
  activeConvId = convId;
  if (socket) {
    socket.emit('leave_conversation', { conversation_id: convId });
    socket.emit('join_conversation',  { conversation_id: convId });
  }

  document.getElementById('chat-area').innerHTML = `
    <div class="chat-header">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;">${name?.[0]||'?'}</div>
      <span>${name}</span>
    </div>
    <div class="messages-container" id="msgs"></div>
    <div class="msg-input-bar">
      <input class="msg-input" id="msg-input" placeholder="Écris un message…" onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="btn btn-primary btn-sm" onclick="sendMsg()">Envoyer</button>
    </div>`;

  try {
    const data = await API.messages.getConv(convId);
    const container = document.getElementById('msgs');
    data.messages.forEach(m => appendMessage(m, container));
    container.scrollTop = container.scrollHeight;
  } catch(e) {}

  loadConversations();
}

function appendMessage(msg, container) {
  const el = container || document.getElementById('msgs');
  if (!el) return;
  const isSent = msg.sender_id === user?.id;
  const div = document.createElement('div');
  div.className = `msg ${isSent ? 'sent' : 'received'}`;
  div.innerHTML = `<div>${escHtml(msg.content)}</div>
    <div class="msg-meta">${isSent?'Toi':msg.sender_name} · ${new Date(msg.created_at).toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'})}</div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

async function sendMsg() {
  const inp = document.getElementById('msg-input');
  const content = inp?.value.trim();
  if (!content || !activeConvId) return;
  inp.value = '';
  try {
    const data = await API.messages.send(activeConvId, content);
    appendMessage(data.message);
  } catch(e) {}
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Check URL param
const params = new URLSearchParams(location.search);
const convParam = params.get('conv');

loadConversations().then(() => {
  if (convParam) openConv(parseInt(convParam), '');
});
</script>
</body>
</html>
