services:
  - type: web
    name: ifri-mentorlink-api
    env: python
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --worker-class eventlet --workers 1 --bind 0.0.0.0:$PORT --log-level info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ifri-mentorlink-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://ifri-mentorlink.onrender.com

  - type: web
    name: ifri-mentorlink-frontend
    env: static
    region: frankfurt
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: ./Frontend/pages
    envVars:
      - key: API_URL
        value: https://ifri-mentorlink-api.onrender.com/api
    routes:
      - type: rewrite
        source: /api/*
        destination: https://ifri-mentorlink-api.onrender.com/api/:splat

databases:
  - name: ifri-mentorlink-db
    region: frankfurt
    plan: free
    databaseName: mentorlink
    user: mentorlink_user
    ipAllowList: []
