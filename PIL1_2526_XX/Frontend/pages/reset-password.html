<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Réinitialisation — IFRI MentorLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css"/>
  <style>
    body { display:flex;align-items:center;justify-content:center;min-height:100vh; }
    .box { background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;max-width:420px;width:100%; }
  </style>
</head>
<body>
<div class="box">
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="font-size:2.5rem;margin-bottom:.5rem;">🔐</div>
    <h1 style="font-size:1.3rem;font-weight:800;">Réinitialiser le mot de passe</h1>
    <p style="color:var(--text-muted);font-size:.9rem;margin-top:.4rem;">
      Contacte l'administrateur IFRI ou utilise la fonctionnalité de changement de mot de passe si tu es connecté.
    </p>
  </div>
  <div style="background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.3);border-radius:10px;padding:1rem;font-size:.85rem;color:var(--warning);margin-bottom:1.5rem;">
    ⚠️ La réinitialisation par email n'est pas encore activée dans cette version. Contacte ton administrateur IFRI.
  </div>
  <a href="signin.html" class="btn btn-outline btn-full">← Retour à la connexion</a>
</div>
</body>
</html>
