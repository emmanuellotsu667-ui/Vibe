<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Notifications — IFRI MentorLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css"/>
  <style>
    .notif-item { display:flex;gap:1rem;padding:1rem;border-radius:10px;border:1px solid var(--border);background:var(--surface);transition:background .2s; }
    .notif-item.unread { background:rgba(108,99,255,.07);border-color:rgba(108,99,255,.25); }
    .notif-icon { width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0; }
    .notif-icon.new_message { background:rgba(108,99,255,.2); }
    .notif-icon.new_match   { background:rgba(76,175,80,.2); }
    .notif-icon.system      { background:rgba(255,193,7,.2); }
  </style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo">🎓 MentorLink</div>
  <a href="dashboard.html"   class="nav-item"><span class="icon">⊞</span> Dashboard</a>
  <a href="requests.html"    class="nav-item"><span class="icon">📋</span> Offres & Demandes</a>
  <a href="matching.html"    class="nav-item"><span class="icon">⚡</span> Matching</a>
  <a href="messages.html"    class="nav-item"><span class="icon">💬</span> Messages</a>
  <a href="notifications.html" class="nav-item active"><span class="icon">🔔</span> Notifications</a>
  <a href="settings.html"    class="nav-item" style="margin-top:auto;"><span class="icon">⚙</span> Paramètres</a>
  <a href="#" class="nav-item" onclick="API.logout()"><span class="icon">⏏</span> Déconnexion</a>
</nav>
<main class="main-content">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;">
    <h1 style="font-size:1.5rem;font-weight:800;">🔔 Notifications</h1>
    <button class="btn btn-outline btn-sm" onclick="markAllRead()">Tout marquer comme lu</button>
  </div>
  <div id="notif-list" style="display:flex;flex-direction:column;gap:.7rem;">
    <div class="loader-ring" style="margin:2rem auto;"></div>
  </div>
</main>
<script src="../js/api.js"></script>
<script>
if (!API.isLoggedIn()) window.location.href = 'signin.html';

const icons = { new_message:'💬', new_match:'⚡', system:'ℹ️' };

async function load() {
  try {
    const data = await API.notifications.list();
    const el = document.getElementById('notif-list');
    if (!data.notifications.length) {
      el.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:3rem;">Aucune notification.</p>';
      return;
    }
    el.innerHTML = data.notifications.map(n => `
      <div class="notif-item ${n.is_read?'':'unread'}" onclick="markRead(${n.id},this)">
        <div class="notif-icon ${n.type}">${icons[n.type]||'📢'}</div>
        <div style="flex:1;">
          <div style="font-weight:${n.is_read?'500':'700'};">${n.title}</div>
          ${n.body ? `<div style="font-size:.85rem;color:var(--text-muted);margin-top:.2rem;">${n.body}</div>` : ''}
          <div style="font-size:.75rem;color:var(--text-muted);margin-top:.3rem;">${new Date(n.created_at).toLocaleString('fr')}</div>
        </div>
        ${!n.is_read ? '<span class="badge badge-primary" style="align-self:center;">Nouveau</span>' : ''}
      </div>`).join('');
  } catch(e) {}
}

async function markRead(id, el) {
  try {
    await API.notifications.read(id);
    el.classList.remove('unread');
    el.querySelector('.badge')?.remove();
  } catch(e) {}
}

async function markAllRead() {
  try {
    await API.notifications.readAll();
    load();
  } catch(e) {}
}

load();
</script>
</body>
</html>
