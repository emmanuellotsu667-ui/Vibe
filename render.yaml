services:
  - type: web
    name: ifri-mentorlink-api
    env: python
    region: frankfurt
    rootDir: PIL1_2526_XX/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --worker-class eventlet --workers 1 --bind 0.0.0.0:$PORT --log-level info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ifri-mentorlink-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://emmanuellotsu667-ui.github.io

  - type: web
    name: ifri-mentorlink-frontend
    env: static
    staticPublishPath: ./PIL1_2526_XX/Frontend/pages
    envVars:
      - key: API_URL
        value: https://ifri-mentorlink-api.onrender.com/api

databases:
  - name: ifri-mentorlink-db
    region: frankfurt
    plan: free
    databaseName: mentorlink
    user: mentorlink_user
    ipAllowList: []
